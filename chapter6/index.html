<!DOCTYPE html>
<html>
<head>
  <title>Petrol Calculator</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(15, 23, 42, 0.95);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-strong: #7dd3fc;
      --border: rgba(148, 163, 184, 0.24);
      --shadow: 0 25px 70px rgba(15, 23, 42, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 28%),
                  linear-gradient(180deg, #0b1120 0%, #0f172a 100%);
      color: var(--text);
      padding: 20px;
    }

    .container {
      width: min(360px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 28px;
      text-align: center;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    h3 {
      margin: 0 0 14px;
      font-size: 1.8rem;
      letter-spacing: 0.02em;
    }

    p {
      color: var(--muted);
      margin: 0;
    }

    input {
      width: 100%;
      margin: 14px 0;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(226, 232, 240, 0.08);
      color: var(--text);
      font-size: 1rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input::placeholder {
      color: rgba(226, 232, 240, 0.6);
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.14);
    }

    button {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 16px 30px rgba(56, 189, 248, 0.24);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 20px 36px rgba(56, 189, 248, 0.28);
    }

    #result {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(148, 163, 184, 0.08);
      color: var(--accent-strong);
      font-weight: 700;
    }

    @media (max-width: 420px) {
      .container {
        padding: 24px 18px;
      }

      input,
      button {
        padding: 12px 14px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Title -->
    <h3>Petrol Calculator</h3>

    <!-- Petrol price input (default 1.72) -->
    <input type="number" id="price" value="1.72">

    <!-- Liters input (default 0) -->
    <input type="number" id="liters" value="0">

    <!-- Calculate button -->
    <button onclick="calculate()">Calculate</button>

    <!-- Result display -->
    <p id="result">Total: 0</p>

  </div>

  <script>
    /* Function to calculate petrol cost */
    function calculate() {
      // Get values from inputs
      let price = document.getElementById("price").value;
      let liters = document.getElementById("liters").value;

      // Calculate total
      let total = price * liters;

      // Display result in paragraph
      document.getElementById("result").innerText = "Total: " + total;
    }
  </script>

</body>
</html>
