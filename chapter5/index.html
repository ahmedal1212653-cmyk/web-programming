<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عرض فيديو</title>
  <style>
    :root {
      --background: linear-gradient(135deg, #1f2041 0%, #3a4b8f 45%, #5068c8 100%);
      --card: rgba(255, 255, 255, 0.12);
      --text: #f5f7ff;
      --accent: #ffd166;
      --shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
      --border: rgba(255, 255, 255, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--background);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      direction: rtl;
    }

    .video-card {
      width: min(900px, 100%);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .video-card header {
      padding: 28px 32px 0;
    }

    .video-card h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 2.4vw, 2.8rem);
    }

    .video-card p {
      margin: 0;
      line-height: 1.75;
      color: rgba(245, 247, 255, 0.84);
    }

    .video-frame {
      display: block;
      width: 100%;
      max-height: 560px;
      outline: none;
      border: none;
      border-top: 1px solid var(--border);
      border-radius: 0 0 24px 24px;
      background: #000;
    }

    .video-frame::-webkit-media-controls-panel {
      background: rgba(0, 0, 0, 0.65);
    }

    .caption {
      text-align: center;
      padding: 18px 24px 28px;
      font-size: 0.95rem;
      color: rgba(245, 247, 255, 0.72);
    }

    .caption strong {
      color: var(--accent);
    }

    @media (max-width: 640px) {
      .video-card {
        border-radius: 18px;
      }

      .video-card header {
        padding: 20px 20px 0;
      }

      .caption {
        padding: 16px 20px 22px;
      }
    }
  </style>
</head>
<body>
  <section class="video-card">
    
    <video class="video-frame" controls loop poster="poster.jpg.jfif">
      <source src="myvideo.mp4.mp4" type="video/mp4">
      متصفحك لا يدعم عنصر الفيديو.
    </video>

    <div class="caption">
    </div>
  </section>
</body>
</html>
