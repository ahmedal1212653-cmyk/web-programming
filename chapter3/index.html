<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Culture - Commercial Gallery</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #faf7f2; /* Light creamy background */
            color: #432818; /* Dark coffee brown text */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }

        .site-nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            width: min(960px, 100%);
            margin-bottom: 32px;
            padding: 18px 16px;
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
        }

        .site-nav a {
            color: #432818;
            text-decoration: none;
            font-weight: 700;
            padding: 10px 16px;
            border-radius: 999px;
            transition: background 0.2s ease;
        }

        .site-nav a:hover {
            background: #e9dac1;
        }

        .image-card {
            background-color: #ffffff;
            border: 1px solid #e6ccb2;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 45px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 450px;
        }

        h1 {
            color: #99582a;
            border-bottom: 2px solid #bb9457;
            padding-bottom: 10px;
            margin-bottom: 50px;
        }

        /* --- CSS Filters for Coffee Theme --- */

        /* 1. Vintage/Sepia Filter for Roasted Beans */
        .filter-vintage {
            filter: sepia(0.5) contrast(1.1) brightness(0.9);
        }

        /* 2. Warm Saturation for Latte Art */
        .filter-warm {
            filter: saturate(1.4) sepia(0.2);
        }

        /* 3. Black & White for Modern Espresso */
        .filter-grayscale {
            filter: grayscale(100%) brightness(0.8);
        }

        img {
            border-radius: 10px;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        img:hover {
            filter: none; /* Shows original colors on hover */
            transform: scale(1.03);
        }

        .copyright-info {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #7f5539;
            font-style: italic;
            padding: 10px;
            background: #ede0d4;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>Theme: The Art of Coffee</h1>

    <div class="image-card">
        <img src="https://images.pexels.com/photos/169505/pexels-photo-169505.jpeg?auto=compress&cs=tinysrgb&w=400" 
             alt="Freshly roasted dark brown coffee beans" 
             title="Roasted to Perfection"
             width="400" 
             height="267" 
             class="filter-vintage">
        <div class="copyright-info">
            License: CC0 / Public Domain (Safe for commercial use) | Size: ~38KB
        </div>
    </div>

    <div class="image-card">
        <img src="https://images.pexels.com/photos/302899/pexels-photo-302899.jpeg?auto=compress&cs=tinysrgb&w=400" 
             alt="A cup of latte coffee with heart-shaped foam art" 
             title="Morning Inspiration"
             width="400" 
             height="267" 
             class="filter-warm">
        <div class="copyright-info">
            License: Pexels Commercial License (No attribution required) | Size: ~42KB
        </div>
    </div>

    <div class="image-card">
        <img src="https://images.pexels.com/photos/312418/pexels-photo-312418.jpeg?auto=compress&cs=tinysrgb&w=400" 
             alt="Espresso dripping from a professional coffee machine" 
             title="Modern Brewing"
             width="400" 
             height="267" 
             class="filter-grayscale">
        <div class="copyright-info">
            License: Free Commercial Use License | Size: ~35KB
        </div>
    </div>

</body>
</html>
